name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**", "chore/**", "refactor/**"]
  pull_request:
    branches: [main]

jobs:
  test-shared:
    name: Test shared
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Poetry installation
        uses: actions/cache@v4
        with:
          path: ~/.local
          key: ${{ runner.os }}-poetry-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: lib/.venv
          key: ${{ runner.os }}-venv-lib-${{ hashFiles('lib/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-venv-lib-

      - name: Install dependencies
        working-directory: lib
        run: poetry install --with dev

      - name: Format check (black)
        working-directory: lib
        run: poetry run black --check .

      - name: Run tests with coverage
        working-directory: lib
        run: |
          poetry run pytest \
            --cov=geofoncier_shared \
            --cov-report=xml \
            --tb=short \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: lib/coverage.xml
          flags: shared
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [auth-service, task-service, analytics-service]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: geofoncier
          POSTGRES_PASSWORD: geofoncier
          POSTGRES_DB: geofoncier_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Cache Poetry installation
        uses: actions/cache@v4
        with:
          path: ~/.local
          key: ${{ runner.os }}-poetry-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.service }}-${{ hashFiles(format('backend/{0}/poetry.lock', matrix.service)) }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.service }}-
            ${{ runner.os }}-pip-

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: backend/${{ matrix.service }}/.venv
          key: ${{ runner.os }}-venv-${{ matrix.service }}-${{ hashFiles(format('backend/{0}/poetry.lock', matrix.service)) }}
          restore-keys: |
            ${{ runner.os }}-venv-${{ matrix.service }}-

      - name: Install dependencies
        working-directory: backend/${{ matrix.service }}
        run: poetry install --with dev

      - name: Format check (black)
        working-directory: backend/${{ matrix.service }}
        run: poetry run black --check .

      - name: Run tests with coverage
        working-directory: backend/${{ matrix.service }}
        env:
          DATABASE_URL: postgresql+asyncpg://geofoncier:geofoncier@localhost/geofoncier_test
          REDIS_URL: redis://localhost:6379
        run: |
          poetry run pytest \
            --cov=app \
            --cov-report=xml \
            --tb=short \
            -v || [ $? -eq 5 ]

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: backend/${{ matrix.service }}/coverage.xml
          flags: ${{ matrix.service }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Start services via docker compose
        run: docker compose up --build -d

      - name: Wait for services to be healthy
        run: |
          for port in 8000 8001 8002; do
            echo "Waiting for service on port $port..."
            for i in $(seq 1 30); do
              curl -sf "http://localhost:${port}/health" && break
              echo "  attempt $i/30 — retrying in 5s"
              sleep 5
            done
            curl -sf "http://localhost:${port}/health" || (echo "Service on $port not ready" && exit 1)
          done

      - name: Install e2e dependencies
        working-directory: test_e2e
        run: poetry install --no-root

      - name: Run e2e tests
        working-directory: test_e2e
        env:
          E2E_AUTH_URL: http://localhost:8000
          E2E_TASK_URL: http://localhost:8001
          E2E_ANALYTICS_URL: http://localhost:8002
          E2E_DB_DSN: postgresql://geofoncier:geofoncier@localhost:5432/geofoncier
        run: poetry run pytest -v

      - name: Show docker compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
