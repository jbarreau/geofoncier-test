name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**", "chore/**", "refactor/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [auth-service, task-service, analytics-service]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: geofoncier
          POSTGRES_PASSWORD: geofoncier
          POSTGRES_DB: geofoncier_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: ${{ matrix.service }}/requirements*.txt

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests with coverage
        working-directory: ${{ matrix.service }}
        env:
          DATABASE_URL: postgresql+asyncpg://geofoncier:geofoncier@localhost/geofoncier_test
          REDIS_URL: redis://localhost:6379
        # --cov-report=term-missing \
        run: |
          pytest \
            --cov=app \
            --cov-report=xml \
            --tb=short \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ${{ matrix.service }}/coverage.xml
          flags: ${{ matrix.service }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
