server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Reverse proxy vers les services backend (préfixe /api strippé) ---
    # Le frontend utilise /api/* pour tous les appels backend.
    # Nginx retire le préfixe /api avant de transmettre au service cible,
    # qui conserve ses propres préfixes (/auth, /tasks, /analytics, /permissions).

    location /api/auth/ {
        rewrite ^/api(/.*) $1 break;
        proxy_pass         http://auth-service:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/tasks/ {
        rewrite ^/api(/.*) $1 break;
        proxy_pass         http://task-service:8001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/analytics/ {
        rewrite ^/api(/.*) $1 break;
        proxy_pass         http://analytics-service:8002;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/permissions/ {
        rewrite ^/api(/.*) $1 break;
        proxy_pass         http://auth-service:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/roles/ {
        rewrite ^/api(/.*) $1 break;
        proxy_pass         http://auth-service:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/users/ {
        rewrite ^/api(/.*) $1 break;
        proxy_pass         http://auth-service:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- Documentation OpenAPI (Swagger UI + schemas JSON) ---
    # Fichiers montés via volume : ./openapi → /usr/share/nginx/openapi/
    location /openapi/ {
        root  /usr/share/nginx;
        index index.html;
        add_header Access-Control-Allow-Origin "*";
    }

    # --- SPA fallback pour Vue Router en mode history ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
