server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Reverse proxy vers les services backend ---
    # IMPORTANT : proxy_pass sans trailing slash → nginx transmet l'URI complète
    # telle quelle. Les services FastAPI enregistrent leurs propres préfixes
    # (/auth, /tasks, /analytics), il ne faut donc pas les stripper.

    location /auth/ {
        proxy_pass         http://auth-service:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /tasks/ {
        proxy_pass         http://task-service:8001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /analytics/ {
        proxy_pass         http://analytics-service:8002;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- Documentation OpenAPI (Swagger UI + schemas JSON) ---
    # Fichiers montés via volume : ./openapi → /usr/share/nginx/openapi/
    location /openapi/ {
        root  /usr/share/nginx;
        index index.html;
        add_header Access-Control-Allow-Origin "*";
    }

    # --- SPA fallback pour Vue Router en mode history ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
