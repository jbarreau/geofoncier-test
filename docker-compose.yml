# ═══════════════════════════════════════════════════════════════
#  DATABASES  — 2 independent PostgreSQL instances
#
#   postgres-auth   ← auth-service       (read / write)
#   postgres-tasks  ← task-service       (read / write)
#               └── analytics-service  (read-only  •  user: analytics_ro)
# ═══════════════════════════════════════════════════════════════

services:
  postgres-auth:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: geofoncier
      POSTGRES_PASSWORD: geofoncier
      POSTGRES_DB: geofoncier_auth
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
      - ./init-db/auth:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geofoncier"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-tasks:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: geofoncier
      POSTGRES_PASSWORD: geofoncier
      POSTGRES_DB: geofoncier_tasks
    volumes:
      - postgres_tasks_data:/var/lib/postgresql/data
      - ./init-db/tasks:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geofoncier"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Generates RSA-2048 key pair on first run; keys are persisted in the
  # jwt_keys named volume and shared with all services that need them.
  keygen:
    image: alpine:3.19
    command: >
      sh -c "
        apk add --no-cache openssl &&
        if [ ! -f /keys/private.pem ]; then
          openssl genrsa -out /keys/private.pem 2048 &&
          openssl rsa -in /keys/private.pem -pubout -out /keys/public.pem &&
          echo '[keygen] RSA key pair generated.'
        else
          echo '[keygen] Keys already exist, skipping.'
        fi
      "
    volumes:
      - jwt_keys:/keys

  # Runs Alembic migrations for auth-service (idempotent).
  migrate:
    build:
      context: .
      dockerfile: backend/auth-service/Dockerfile
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://geofoncier:geofoncier@postgres-auth/geofoncier_auth
      JWT_PRIVATE_KEY_PATH: /keys/private.pem
      JWT_PUBLIC_KEY_PATH: /keys/public.pem
    volumes:
      - jwt_keys:/keys
    depends_on:
      postgres-auth:
        condition: service_healthy
      keygen:
        condition: service_completed_successfully

  # Runs Alembic migrations for task-service (idempotent).
  # Runs in parallel with migrate — independent database instance.
  migrate-tasks:
    build:
      context: .
      dockerfile: backend/task-service/Dockerfile
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://geofoncier:geofoncier@postgres-tasks/geofoncier_tasks
    depends_on:
      postgres-tasks:
        condition: service_healthy

  # Inserts default roles, permissions, and three seed users (idempotent).
  # Default credentials: see scripts/seed.py or README.
  seed:
    build:
      context: .
      dockerfile: backend/auth-service/Dockerfile
    command: python /scripts/seed.py
    environment:
      DATABASE_URL: postgresql+asyncpg://geofoncier:geofoncier@postgres-auth/geofoncier_auth
    volumes:
      - ./scripts:/scripts
    depends_on:
      migrate:
        condition: service_completed_successfully
      migrate-tasks:
        condition: service_completed_successfully

  auth-service:
    build:
      context: .
      dockerfile: backend/auth-service/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://geofoncier:geofoncier@postgres-auth/geofoncier_auth
      REDIS_URL: redis://redis:6379
      JWT_PRIVATE_KEY_PATH: /keys/private.pem
      JWT_PUBLIC_KEY_PATH: /keys/public.pem
    volumes:
      - jwt_keys:/keys
    depends_on:
      seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  task-service:
    build:
      context: .
      dockerfile: backend/task-service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://geofoncier:geofoncier@postgres-tasks/geofoncier_tasks
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_URL: http://auth-service:8000
      JWT_PUBLIC_KEY_PATH: /keys/public.pem
    volumes:
      - jwt_keys:/keys
    depends_on:
      seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  # analytics-service connects read-only to postgres-tasks.
  # It never writes — no migrations, SELECT queries only.
  analytics-service:
    build:
      context: .
      dockerfile: backend/analytics-service/Dockerfile
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql+asyncpg://analytics_ro:analytics_ro@postgres-tasks/geofoncier_tasks
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_URL: http://auth-service:8000
      JWT_PUBLIC_KEY_PATH: /keys/public.pem
    volumes:
      - jwt_keys:/keys
    depends_on:
      seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    volumes:
      - ./openapi:/usr/share/nginx/openapi:ro
    depends_on:
      - auth-service
      - task-service
      - analytics-service

  # Optional mock data — run once after the stack is up:
  #   docker compose --profile mock run --rm mock-users
  #   docker compose --profile mock run --rm mock-tasks
  mock-users:
    build:
      context: .
      dockerfile: backend/auth-service/Dockerfile
    profiles:
      - mock
    command: python /scripts/mock_users.py
    environment:
      DATABASE_URL: postgresql+asyncpg://geofoncier:geofoncier@postgres-auth/geofoncier_auth
    volumes:
      - ./scripts:/scripts
    depends_on:
      seed:
        condition: service_completed_successfully

  # mock-tasks reads user IDs from postgres-auth and writes tasks to postgres-tasks.
  mock-tasks:
    build:
      context: .
      dockerfile: backend/task-service/Dockerfile
    profiles:
      - mock
    command: python /scripts/mock_tasks.py
    environment:
      AUTH_DATABASE_URL: postgresql+asyncpg://geofoncier:geofoncier@postgres-auth/geofoncier_auth
      DATABASE_URL: postgresql+asyncpg://geofoncier:geofoncier@postgres-tasks/geofoncier_tasks
    volumes:
      - ./scripts:/scripts
    depends_on:
      seed:
        condition: service_completed_successfully

volumes:
  postgres_auth_data:
  postgres_tasks_data:
  jwt_keys:
